name: release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: freebsd
            goarch: amd64
          - goos: freebsd
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build archives
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || format('master-{0}', github.sha) }}
        run: |
          set -e
          mkdir -p dist
          base="iqs-tunnel_${VERSION}_${GOOS}_${GOARCH}"
          outdir="dist/${base}"
          mkdir -p "${outdir}"

          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -X github.com/blackestwhite/iqs-tunnel/internal/buildinfo.Version=${VERSION}" -o "${outdir}/iqs-client" ./cmd/iqs-client
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -X github.com/blackestwhite/iqs-tunnel/internal/buildinfo.Version=${VERSION}" -o "${outdir}/iqs-server" ./cmd/iqs-server

          cp README.md "${outdir}/README.md"
          cp configs/client.example.json "${outdir}/client.example.json"
          cp configs/server.example.json "${outdir}/server.example.json"

          tar -C dist -czf "dist/${base}.tar.gz" "${base}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: build-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -e
          cd dist
          sha256sum *.tar.gz > SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS.txt
          generate_release_notes: true
          draft: false
          prerelease: false
